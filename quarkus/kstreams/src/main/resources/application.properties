%dev.quarkus.log.json.console.enabled=false

app.generator.enabled=true
app.punctuation.enabled=false

quarkus.kafka.devservices.enabled=false
#quarkus.kafka.devservices.container-env.KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
#quarkus.kafka.devservices.topic-partitions.ping=1

mp.messaging.outgoing.ping.connector=smallrye-kafka
mp.messaging.outgoing.ping.merge=true
mp.messaging.outgoing.ping.topic=ping

quarkus.http.host=0.0.0.0
#quarkus.http.port=8080

#
# https://quarkus.io/guides/kafka-streams#configuration-reference
# https://kafka.apache.org/42/streams/developer-guide/config-streams/#configuration-parameter-reference
#
quarkus.kafka-streams.topics=ping
# https://kafka.apache.org/42/streams/developer-guide/config-streams/#applicationid
# (Required) The application ID. Each stream processing application must have a unique ID. The same ID must be given to all instances of the application. It is recommended to use only alphanumeric characters, . (dot), - (hyphen), and _ (underscore). Examples: "hello_world", "hello_world-v1.0.0"
#
# This ID is used in the following places to isolate resources used by the application from others:
#
# As the default Kafka consumer and producer client.id prefix
# As the Kafka consumer group.id for coordination
# As the name of the subdirectory in the state directory (cf. state.dir)
# As the prefix of internal Kafka topic names
#
# Tip: When an application is updated, the application.id should be changed unless you want to reuse the existing data in internal topics and state stores. For example, you could embed the version information within application.id, as my-app-v1.0.0 and my-app-v1.0.2.
quarkus.kafka-streams.application-id=abc

# pass-through options
#kafka-streams.state.dir=
#kafka-streams.cache.max.bytes.buffering=10240
#kafka-streams.commit.interval.ms=1000
#kafka-streams.metadata.max.age.ms=500
#kafka-streams.auto.offset.reset=earliest
#kafka-streams.metrics.recording.level=DEBUG
kafka.max.request.size=10485760
