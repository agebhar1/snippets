---
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "containers"
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus

      - targets:
          - grafana:3000
        labels:
          service: grafana
      - targets:
          - agent:8888
        labels:
          service: agent
      - targets:
          - collector:8888
        labels:
          service: collector
      - targets:
          - promtail:9080
        labels:
          service: promtail
      - targets:
          - tempo:3200
        labels:
          service: tempo
      - targets:
          - loki:3100
        labels:
          service: loki

  - job_name: "quarkus"
    metrics_path: "/q/metrics"
    static_configs:
      - targets:
          - service:8080
        labels:
          service: service
