---
# See https://github.com/open-telemetry/opentelemetry-collector/blob/main/docs/security-best-practices.md#safeguards-against-denial-of-service-attacks

extensions:
  health_check:

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
  otlp_grpc:
    endpoint: collector:4317
    tls:
      insecure: true

service:
  extensions: [ health_check ]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888

  pipelines:
    traces/tempo:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ debug,otlp_grpc ]

    metrics:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ debug,otlp_grpc ]

    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ debug,otlp_grpc ]
